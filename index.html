<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, initial-scale=0.3, minimum-scale=0.1, maximum-scale=5.0, user-scalable=yes">
    <title>COMMAND CENTER PT. HASAN SINAR LESTARI</title>
    <style>
    :root {
        --bg: #e0f2fe; /* Biru Langit Muda */
        --header-bg: #ffffff;
        --card: #ffffff;
        --border: #bae6fd;
        --text-dark: #0369a1;
        --text-gray: #64748b;
        --green: #22c55e;
        --blue: #3b82f6;
        --gold: #eab308; 
        --red: #ef4444;
        --accent-gold: #b45309;
    }

    body {
        background: var(--bg);
        color: var(--text-dark);
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        margin: 0;
        padding: 10px 20px;
        
        /* MODIFIKASI CIMI DEWA */
        width: 1280px; 
        height: 100vh; /* Kunci tinggi sesuai layar */
        overflow: hidden; /* MATIKAN SCROLL */
        
        display: flex;
        flex-direction: column;
        box-sizing: border-box;
    }

    header {
        text-align: left;
        padding: 10px 0;
        font-size: 24px;
        font-weight: 800;
        letter-spacing: 1px;
        color: var(--accent-gold);
        border-bottom: 3px solid var(--accent-gold);
        margin-bottom: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%; /* Pastikan header ikut lebar body */
    }

    .grid-container {
        display: grid;
        /* MODIFIKASI CIMI: Gunakan 3 Kolom agar lebih ringkas dalam satu layar */
        grid-template-columns: repeat(3, 1fr); 
        gap: 12px;
        flex-grow: 1;
        padding-bottom: 10px;
        width: 100%;
    }

    .unit-card {
        background: var(--card);
        border: 2px solid var(--border);
        border-radius: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 20px; /* Padding sedikit diperlebar */
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        min-height: 100px; /* Jaga tinggi minimal */
    }

    .info-main {
        display: flex;
        flex-direction: column;
    }

    .plat {
        font-size: 20px;
        font-weight: 900;
        color: #0c4a6e;
        letter-spacing: 0.5px;
    }

    .sopir {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-gray);
    }

    .tujuan {
        font-size: 13px;
        color: var(--blue);
        font-weight: 500;
        margin-top: 2px;
    }

    .status-timer {
        text-align: right;
    }

    .badge {
        font-size: 11px;
        padding: 3px 10px;
        border-radius: 20px;
        text-transform: uppercase;
        font-weight: 800;
        color: #fff;
        display: inline-block;
        margin-bottom: 5px;
    }

    .timer {
        font-family: 'Consolas', monospace;
        font-size: 24px;
        font-weight: bold;
        color: #1e293b;
    }

    /* Border warna kiri sesuai status */
    .status-otw-berangkat { border-left: 8px solid var(--blue); }
    .status-lama-bongkar { border-left: 8px solid var(--gold); }
    .status-otw-pulang { border-left: 8px solid var(--green); }
    .status-standby { border-left: 8px solid var(--red); }

    /* Gaya untuk Tulisan FOTO SJ */
.btn-foto-sj {
    color: #3b82f6; /* Biru */
    text-decoration: underline;
    font-weight: 800;
    cursor: pointer;
    font-size: 12px;
    margin-top: 5px;
}

.tonase {
    font-size: 13px;
    font-weight: bold;
    color: #1e293b;
    margin-top: 2px;
}

/* Modal Pop-up */
.modal-sj {
    display: none; /* Sembunyi di awal */
    position: fixed;
    z-index: 10000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.9);
}

.modal-content {
    margin: auto;
    display: block;
    max-width: 80%;
    max-height: 80%;
    margin-top: 50px;
    border: 5px solid white;
    border-radius: 10px;
}

.close-modal {
    position: absolute;
    top: 20px;
    right: 35px;
    color: #f1f1f1;
    font-size: 40px;
    font-weight: bold;
    cursor: pointer;
}
</style>
</head>
<body>

    <div id="welcome-screen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #0369a1 0%, #0c4a6e 100%); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center;">
    <h1 style="font-size: 40px; margin-bottom: 10px; letter-spacing: 2px;">WELCOME TO</h1>
    <h2 style="font-size: 50px; font-weight: 900; color: #eab308; margin-bottom: 30px;">SYSTEM DIGITAL HSL</h2>
    <p style="font-size: 18px; margin-bottom: 40px; opacity: 0.8;">Monitoring Armada & Operasional Real-Time</p>
    
    <button onclick="masukSistem()" style="padding: 20px 50px; font-size: 24px; font-weight: bold; color: #0369a1; background: #ffffff; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: transform 0.2s;">
        MASUK SISTEM 🚀
    </button>
</div>

    <header>
        <span>COMMAND CENTER PT. HASAN SINAR LESTARI</span>
        <div style="display: flex; align-items: center; gap: 15px;">
            <span style="font-size: 14px; color: var(--text-gray);" id="live-clock"></span>
            </div>
    </header>

    <div class="grid-container" id="fleet-grid">
        </div>

        <div id="myModal" class="modal-sj">
    <span class="close-modal" onclick="tutupModal()">&times;</span>
    <img class="modal-content" id="img-sj">
    <div id="caption-sj" style="text-align:center; color:white; padding:10px; font-weight:bold;"></div>
</div>

    <script type="module">
    // 1. IMPORT FIREBASE SDK
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // 2. CONFIG FIREBASE HABI
    const firebaseConfig = {
        apiKey: "AIzaSyAZ2e-WKpiIIn3DkwuuO_v1FfY2Dhxsnrg",
        authDomain: "system-hasan-lestari.firebaseapp.com",
        databaseURL: "https://system-hasan-lestari-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "system-hasan-lestari",
        storageBucket: "system-hasan-lestari.firebasestorage.app",
        messagingSenderId: "341447120860",
        appId: "1:341447120860:web:fcc93ac4c7320767cae119"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const platList = [
        "B 9686 SFU", "D 9245 AJ", "D 9246 AJ", "D 9247 AJ",
        "D 9094 AG", "D 9698 AG", "D 9803 AH", "D 9804 AG",
        "D 9560 AG", "D 9561 AG9", "D 9737 AG", "D 9529 AI"
    ];

    const grid = document.getElementById('fleet-grid');

    function getColor(status) {
        if(status === "STANDBY") return "red";
        if(status === "LAMA BONGKAR") return "gold";
        if(status === "OTW BERANGKAT") return "blue";
        return "green";
    }

    // --- FUNGSI POPUP FOTO (MODAL) ---
    window.bukaFoto = function(url, plat) {
        if(!url || url === "" || url === "-") {
            alert("Sopir belum upload Surat Jalan untuk unit " + plat);
            return;
        }
        document.getElementById("myModal").style.display = "block";
        document.getElementById("img-sj").src = url;
        document.getElementById("caption-sj").innerText = "Surat Jalan Unit: " + plat;
    }

    window.tutupModal = function() {
        document.getElementById("myModal").style.display = "none";
    }

    // 4. LISTEN DATA DARI FIREBASE
    onValue(ref(db, 'pt_hsl/fleet'), (snapshot) => {
        const firebaseData = snapshot.val() || {};
        grid.innerHTML = ""; 

        platList.forEach((plat) => {
            const dbID = plat.replace(/\s+/g, '_'); 
            
            const unit = firebaseData[dbID] || {
                plat: plat,
                sopir: "-",
                tujuan: "Menunggu Input...",
                status: "STANDBY",
                startTime: new Date().getTime(),
                tonase: 0,      // Tambahan default Tonase
                fotoUrl: "-"    // Tambahan default Foto
            };

            const statusClass = unit.status.toLowerCase().replace(/\s+/g, '-');
            
            grid.innerHTML += `
                <div class="unit-card status-${statusClass}">
                    <div class="info-main">
                        <span class="plat">${unit.plat}</span>
                        <span class="sopir">👤 ${unit.sopir}</span>
                        <span class="tujuan">📍 ${unit.tujuan}</span>
                        <div class="tonase">⚖️ <b>${unit.tonase || 0}</b> TON</div>
                        <div class="btn-foto-sj" onclick="bukaFoto('${unit.fotoUrl}', '${unit.plat}')">📄 FOTO SJ</div>
                    </div>
                    <div class="status-timer">
                        <span class="badge" style="background:var(--${getColor(unit.status)})">${unit.status}</span>
                        <div class="timer" data-start="${unit.startTime}">00:00:00</div>
                    </div>
                </div>
            `;
        });
    });

    // 5. UPDATE STOPWATCH & JAM DIGITAL
    setInterval(() => {
        document.querySelectorAll('.timer').forEach(t => {
            const start = parseInt(t.getAttribute('data-start'));
            if (start > 0) {
                const diff = new Date().getTime() - start;
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                t.innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            } else {
                t.innerText = "00:00:00";
            }
        });

        const now = new Date();
        const jamHeader = document.getElementById('live-clock');
        if(jamHeader) jamHeader.innerText = now.toLocaleString('id-ID');
    }, 1000);

    // 6. FUNGSI MASUK SISTEM (FULLSCREEN)
    window.masukSistem = async function() {
        const elem = document.documentElement;
        try {
            if (elem.requestFullscreen) { await elem.requestFullscreen(); }
            else if (elem.webkitRequestFullscreen) { await elem.webkitRequestFullscreen(); }

            if (screen.orientation && screen.orientation.lock) {
                await screen.orientation.lock('landscape').catch(err => console.log("Rotate Manual ya!"));
            }

            const welcome = document.getElementById('welcome-screen');
        welcome.style.opacity = "0";
        setTimeout(() => { 
            welcome.style.display = "none";
            // TRIK: Paksa scroll ke atas agar posisi pas di tengah
            window.scrollTo(0, 0);
        }, 500);

    } catch (err) {
        document.getElementById('welcome-screen').style.display = "none";
    }
};
</script>
</body>
</html>
